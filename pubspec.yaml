name: purna_panchang
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  table_calendar: ^3.2.0
  share_plus: ^12.0.2
  rename_app: ^1.6.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/purna_panchang_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFF8E1"
  adaptive_icon_foreground: "assets/purna_panchang_logo.png"
